version: 0.2

env:
  variables:
    AWS_REGION: eu-west-1
    IMAGE_REPO_NAME: devops
    IMAGE_TAG: latest

phases:
  install:
    runtime-versions:
      nodejs: 16
    commands:
      - echo "Installation des dépendances"
      - npm install --legacy-peer-deps

  pre_build:
    commands:
      - echo "Connexion à ECR"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPO_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REPO_URI

  build:
    commands:
      - echo "Build Angular"
      - npm run build --prod

      - echo "Activation buildx"
      - docker buildx create --use
      - docker buildx inspect --bootstrap

      - echo "Build & Push Docker (amd64)"
      - docker buildx build --platform linux/amd64 -t $REPO_URI:$IMAGE_TAG --push .

  post_build:
    commands:
      - echo "Build terminé"
