version: 0.2

env:
  variables:
    AWS_REGION: eu-west-1
    IMAGE_REPO_NAME: devops
    IMAGE_TAG: latest

phases:
  install:
    runtime-versions:
      nodejs: 16
    commands:
      - echo "Installation des dépendances"
      - npm install --legacy-peer-deps

  pre_build:
    commands:
      - echo "Connexion à ECR"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPO_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REPO_URI

  build:
    commands:
      - echo "Build Angular"
      - npm run build --prod

      - echo "Build Docker (force amd64 via base image)"
      - docker build -t $IMAGE_REPO_NAME .

      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPO_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Push Docker vers ECR"
      - docker push $REPO_URI:$IMAGE_TAG