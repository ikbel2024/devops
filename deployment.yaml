apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: angular
  template:
    metadata:
      labels:
        app: angular
    spec:
      containers:
      - name: angular
        image: 723951822917.dkr.ecr.eu-west-1.amazonaws.com/devops:latest
        ports:
        - containerPort: 80
