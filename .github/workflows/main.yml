name: CI/CD Pipeline
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/mon-app-repo:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/mon-app-repo:latest

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name devops-cluster

      - name: Deploy to EKS
        run: kubectl rollout restart deployment/mon-app-deployment || kubectl apply -f k8s/
